[package]
name = "shitma"
version = "0.1.0"
compiler = "0.14.0"
entrypoint = "src/lib.typ"
authors = ["him"]
license = "Unlicense"
description = "A paper template with which to submit to SHITMA"
homepage = ""
repository = "https://github.com/shitmajournal/shitma-template"
keywords = ["paper", "article", "journal", "conference"]
categories = ["paper"]
exclude = [
	".github",
	"docs",
	"scripts",
	"tests",
	".typstignore",
	"Justfile",
	"thumbnails",
]

[template]
path = "template"
entrypoint = "main.typ"

